# This file tests the collect-on-failure functionality with Kind.
# It deploys a pod with known files, intentionally fails verification,
# and expects the collect phase to copy files out before cleanup.

setup:
  env: kind
  file: ../kind-cluster.yaml
  timeout: 10m
  kind:
    import-images:
      - busybox:latest
  steps:
    - name: deploy collect-test pod
      command: kubectl apply -f test/e2e/kind/collect-on-failure/deployment.yaml
      wait:
        - namespace: default
          resource: pod
          label-selector: app=collect-test
          for: condition=Ready

cleanup:
  on: always
  collect:
    on: failure
    output-dir: /tmp/e2e-collect-test
    items:
      - namespace: default
        label-selector: app=collect-test
        paths:
          - /test-data/logs/
          - /test-data/debug.txt

verify:
  retry:
    count: 1
    interval: 1s
  cases:
    - name: intentionally-fail-to-trigger-collection
      query: echo "actual-value"
      expected: expected.yaml
